name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2am UTC
  workflow_dispatch:
  workflow_call:  # Allow this workflow to be called by other workflows

jobs:
  bandit:
    name: Bandit (Python Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit
        run: |
          cd apps/api
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen
        continue-on-error: true
      
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: apps/api/bandit-report.json
        if: always()

  trivy-fs:
    name: Trivy (Filesystem Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy Filesystem Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            aquasec/trivy:0.69.1 fs \
            --format sarif \
            --output /work/trivy-fs-results.sarif \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --timeout 10m \
            --exit-code 0 \
            /work
      
      - name: Enforce Trivy Filesystem Findings Threshold
        run: |
          python - <<'PY'
          import collections
          import json
          import os
          import sys
          
          sarif_path = "trivy-fs-results.sarif"
          if not os.path.exists(sarif_path):
              print(f"::error::Trivy did not produce {sarif_path}.")
              sys.exit(1)
          
          with open(sarif_path, encoding="utf-8") as f:
              sarif = json.load(f)
          
          findings = []
          for run in sarif.get("runs", []):
              findings.extend(run.get("results", []))
          
          if findings:
              by_rule = collections.Counter((item.get("ruleId") or "unknown") for item in findings)
              summary = ", ".join(f"{rule}({count})" for rule, count in by_rule.most_common(10))
              print(f"::error::{len(findings)} HIGH/CRITICAL findings in Trivy filesystem scan. Top rules: {summary}")
              sys.exit(1)
          
          print("No HIGH/CRITICAL findings in Trivy filesystem scan.")
          PY
      
      - name: Upload Trivy Filesystem Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs-results.sarif
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
      
      - name: Upload Trivy FS Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        continue-on-error: true

  trivy-backend-image:
    name: Trivy (Backend Container)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Docker Image
        run: |
          docker build -t coffeestudio-backend:test apps/api/
      
      - name: Run Trivy Container Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            aquasec/trivy:0.69.1 image \
            --format sarif \
            --output /work/trivy-backend-results.sarif \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --timeout 10m \
            --exit-code 0 \
            coffeestudio-backend:test
      
      - name: Enforce Trivy Backend Findings Threshold
        run: |
          python - <<'PY'
          import collections
          import json
          import os
          import sys
          
          sarif_path = "trivy-backend-results.sarif"
          if not os.path.exists(sarif_path):
              print(f"::error::Trivy did not produce {sarif_path}.")
              sys.exit(1)
          
          with open(sarif_path, encoding="utf-8") as f:
              sarif = json.load(f)
          
          findings = []
          for run in sarif.get("runs", []):
              findings.extend(run.get("results", []))
          
          if findings:
              by_rule = collections.Counter((item.get("ruleId") or "unknown") for item in findings)
              summary = ", ".join(f"{rule}({count})" for rule, count in by_rule.most_common(10))
              print(f"::error::{len(findings)} HIGH/CRITICAL findings in Trivy backend container scan. Top rules: {summary}")
              sys.exit(1)
          
          print("No HIGH/CRITICAL findings in Trivy backend container scan.")
          PY
      
      - name: Upload Trivy Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-sarif
          path: trivy-backend-results.sarif
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
      
      - name: Upload Trivy Backend Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        continue-on-error: true

  trivy-frontend-image:
    name: Trivy (Frontend Container)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Frontend Docker Image
        id: build_frontend
        run: |
          docker build -t coffeestudio-frontend:test apps/web/
        continue-on-error: true
      
      - name: Run Trivy Container Scan
        if: steps.build_frontend.outcome == 'success'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            aquasec/trivy:0.69.1 image \
            --format sarif \
            --output /work/trivy-frontend-results.sarif \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignorefile /work/apps/web/.trivyignore \
            --ignore-unfixed \
            --timeout 10m \
            --exit-code 0 \
            coffeestudio-frontend:test
      
      - name: Enforce Trivy Frontend Findings Threshold
        if: steps.build_frontend.outcome == 'success'
        run: |
          python - <<'PY'
          import collections
          import json
          import os
          import sys
          
          sarif_path = "trivy-frontend-results.sarif"
          if not os.path.exists(sarif_path):
              print(f"::error::Trivy did not produce {sarif_path}.")
              sys.exit(1)
          
          with open(sarif_path, encoding="utf-8") as f:
              sarif = json.load(f)
          
          findings = []
          for run in sarif.get("runs", []):
              findings.extend(run.get("results", []))
          
          if findings:
              by_rule = collections.Counter((item.get("ruleId") or "unknown") for item in findings)
              summary = ", ".join(f"{rule}({count})" for rule, count in by_rule.most_common(10))
              print(f"::error::{len(findings)} HIGH/CRITICAL findings in Trivy frontend container scan. Top rules: {summary}")
              sys.exit(1)
          
          print("No HIGH/CRITICAL findings in Trivy frontend container scan.")
          PY
      
      - name: Upload Trivy Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-sarif
          path: trivy-frontend-results.sarif
        if: steps.build_frontend.outcome == 'success' && hashFiles('trivy-frontend-results.sarif') != ''
      
      - name: Upload Trivy Frontend Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'
        if: steps.build_frontend.outcome == 'success' && hashFiles('trivy-frontend-results.sarif') != ''
        continue-on-error: true

  snyk:
    name: Snyk (Dependency Security)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities (Backend)
        uses: snyk/actions/python-3.10@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=apps/api/requirements.txt
        continue-on-error: true
      
      - name: Run Snyk to check for vulnerabilities (Frontend)
        uses: snyk/actions/node@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=apps/web/package.json
        continue-on-error: true

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript-typescript']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Semgrep
        run: pip install semgrep
      
      - name: Run Semgrep
        run: |
          semgrep --config auto --sarif -o semgrep-results.sarif
        continue-on-error: true
      
      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: 'semgrep'
        if: always()
        continue-on-error: true
      
      - name: Upload Semgrep Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
        if: always()
