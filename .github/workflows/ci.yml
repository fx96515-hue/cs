name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-meta:
    name: CI Pipeline Meta Check
    runs-on: ubuntu-latest
    steps:
      - name: CI Summary
        run: |
          echo "Meta check passed."
          echo "Dedicated workflows run separately:"
          echo "- Backend CI (.github/workflows/ci-backend.yml)"
          echo "- Frontend CI (.github/workflows/ci-frontend.yml)"
          echo "- Security Scans (.github/workflows/ci-security.yml)"
          echo "- Build & Push Docker Images (.github/workflows/docker-build.yml)"
