name: SonarQube / SonarCloud Scan (optional)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonar:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check Sonar configuration
        id: sonar_config
        shell: bash
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ vars.SONAR_PROJECT_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing SONAR_TOKEN or SONAR_PROJECT_KEY" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ secrets.SONAR_HOST_URL }}" ] && [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing SONAR_ORGANIZATION for SonarCloud" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=ok" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.sonar_config.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - name: Setup Python
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install deps (API)
        if: steps.sonar_config.outputs.enabled == 'true'
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage (API)
        if: steps.sonar_config.outputs.enabled == 'true'
        env:
          DATABASE_URL: postgresql+psycopg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci_minimum_32_characters_long
        run: |
          cd apps/api
          pytest tests/ -q --cov=app --cov-report=xml:coverage.xml --cov-fail-under=0

      - name: Disable SonarCloud Automatic Analysis
        if: steps.sonar_config.outputs.enabled == 'true' && secrets.SONAR_HOST_URL == ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        shell: bash
        run: |
          http_code=$(curl -sS -o autoscan_response.json -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "projectKey=${SONAR_PROJECT_KEY}" \
            --data-urlencode "enable=false" \
            "https://sonarcloud.io/api/autoscan/activation")
          if [ "${http_code}" -ge 400 ]; then
            echo "Unable to disable SonarCloud automatic analysis (HTTP ${http_code})."
            cat autoscan_response.json
            exit 1
          fi

      - name: Build Sonar arguments
        if: steps.sonar_config.outputs.enabled == 'true'
        id: sonar_args
        shell: bash
        run: |
          args="-Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}"
          args="$args -Dsonar.sources=apps/api/app"
          args="$args -Dsonar.tests=apps/api/tests"
          args="$args -Dsonar.python.coverage.reportPaths=apps/api/coverage.xml"
          if [ -n "${{ vars.SONAR_ORGANIZATION }}" ]; then
            args="$args -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Sonar scan (Python coverage)
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: ${{ steps.sonar_args.outputs.args }}

      - name: Explain why sonar is skipped
        if: steps.sonar_config.outputs.enabled != 'true'
        run: |
          echo "Skipping Sonar scan: ${{ steps.sonar_config.outputs.reason }}"
