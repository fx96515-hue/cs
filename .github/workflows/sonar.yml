name: SonarQube / SonarCloud Scan (optional)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonar:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check Sonar configuration
        id: sonar_config
        shell: bash
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ vars.SONAR_PROJECT_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing SONAR_TOKEN or SONAR_PROJECT_KEY" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ secrets.SONAR_HOST_URL }}" ] && [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing SONAR_ORGANIZATION for SonarCloud" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=ok" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.sonar_config.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - name: Setup Python
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install deps (API)
        if: steps.sonar_config.outputs.enabled == 'true'
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage (API)
        if: steps.sonar_config.outputs.enabled == 'true'
        env:
          DATABASE_URL: postgresql+psycopg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci_minimum_32_characters_long
        run: |
          cd apps/api
          pytest tests/ -q --cov=app --cov-report=xml:coverage.xml --cov-fail-under=0

      - name: Disable SonarCloud Automatic Analysis
        if: steps.sonar_config.outputs.enabled == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        shell: bash
        run: |
          if [ -n "${SONAR_HOST_URL}" ]; then
            echo "Skipping autoscan toggle for self-hosted SonarQube."
            exit 0
          fi
          http_code=$(curl -sS -o autoscan_response.json -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "projectKey=${SONAR_PROJECT_KEY}" \
            --data-urlencode "enable=false" \
            "https://sonarcloud.io/api/autoscan/activation")
          if [ "${http_code}" -ge 400 ]; then
            echo "Unable to disable SonarCloud automatic analysis (HTTP ${http_code})."
            cat autoscan_response.json
            exit 1
          fi

      - name: Build Sonar arguments
        if: steps.sonar_config.outputs.enabled == 'true'
        id: sonar_args
        uses: actions/github-script@v8
        env:
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        with:
          script: |
            const args = [
              `-Dsonar.projectKey=${process.env.SONAR_PROJECT_KEY}`,
              "-Dsonar.sources=apps/api/app",
              "-Dsonar.tests=apps/api/tests",
              "-Dsonar.python.coverage.reportPaths=apps/api/coverage.xml",
              "-Dsonar.newCode.referenceBranch=main",
            ];
            if (process.env.EVENT_NAME === "pull_request") {
              args.push(`-Dsonar.pullrequest.key=${process.env.PR_NUMBER}`);
              args.push(`-Dsonar.pullrequest.branch=${process.env.HEAD_REF}`);
              args.push(`-Dsonar.pullrequest.base=${process.env.BASE_REF}`);
            }
            if (process.env.SONAR_ORGANIZATION) {
              args.push(`-Dsonar.organization=${process.env.SONAR_ORGANIZATION}`);
            }
            core.setOutput("args", args.join(" "));

      - name: Sonar scan (Python coverage)
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: ${{ steps.sonar_args.outputs.args }}

      - name: Enforce new-code gate (critical + vulnerabilities)
        if: steps.sonar_config.outputs.enabled == 'true' && github.event_name == 'pull_request' && vars.SONAR_ENFORCE_NEW_CODE_GATE != 'false'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_PULL_REQUEST: ${{ github.event.pull_request.number }}
          SONAR_GATE_MAX_WAIT_SEC: ${{ vars.SONAR_GATE_MAX_WAIT_SEC != '' && vars.SONAR_GATE_MAX_WAIT_SEC || '180' }}
          SONAR_GATE_POLL_INTERVAL_SEC: ${{ vars.SONAR_GATE_POLL_INTERVAL_SEC != '' && vars.SONAR_GATE_POLL_INTERVAL_SEC || '10' }}
        run: python scripts/automation/sonar_enforce_new_code_gate.py

      - name: Explain why sonar is skipped
        if: steps.sonar_config.outputs.enabled != 'true'
        run: |
          echo "Skipping Sonar scan: ${{ steps.sonar_config.outputs.reason }}"
